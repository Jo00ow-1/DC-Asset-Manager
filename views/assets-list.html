<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 목록 - DC Asset Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>자산 목록</h1>
        <a href="/dashboard" class="btn btn-secondary mb-3">대시보드로</a>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>카테고리</th>
                    <th>스펙</th>
                    <th>벤더</th>
                    <th>수량</th>
                    <th>상태</th>
                    <th>등록자</th>
                </tr>
            </thead>
            <tbody id="assetTableBody">
                <!--JS데이터로 채울예정?-->
            </tbody>
        </table>
    </div>

    <script>
        fetch("/api/assets")
            .then(res => res.json())
            .then(assets => {
                const tbody = document.getElementById("assetTableBody");

                assets.forEach(asset => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${asset.id}</td>
                        <td>${asset.category}</td>
                        <td>${asset.spec}</td>
                        <td>${asset.vendor ?? "-"}</td>
                        <td>${asset.quantity}</td>
                        <td>${asset.status}</td>
                        <td>${asset.created_by}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => {
                console.error(err);
                alert("자산 목록을 불러오지 못했습니다.");
            });
    </script>
</body>
</html>
